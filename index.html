<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine Surprise</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5a3b7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* card */

.card{
    background:white;
    width:420px;
    height:460px;
    border-radius:25px;
    text-align:center;
    padding:30px;
    position:relative;
}

/* images */

img{
    width:200px;
    margin-top:10px;
}

/* buttons */

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

#yes{
    background:#ff2b8a;
    color:white;
    margin-top:20px;
}

#no{
    background:#ddd;
    position:absolute;
    top:300px;
    right:80px;
}

/* second page */

#secondPage{
    display:none;
}

.message{
    font-size:22px;
    color:#ff2b8a;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<!-- FIRST PAGE -->

<div id="firstPage">

<h2>আমার সাথে কি এক কাপ কফি খাওয়া যায়? ❤️</h2>

<img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">

<p>আমার কফিতে চিনি কম হবে। কারণ, মিষ্টি একটা মেয়ের সামনে বসে, বেশি মিষ্টি কফি খাওয়া এক ধরণের অপরাধ। ☕👩‍❤️‍👨</p>

<button id="yes">Yes 💖</button>
<button id="no">No</button>

</div>


<!-- SECOND PAGE -->

<div id="secondPage">

<h2>Yaaay! You said YES! 🥰</h2>

<img src="https://cdn-icons-png.flaticon.com/512/2584/2584606.png">

<div class="message">
You & Me Forever ❤️<br>
Like these cute teddies 🧸💞
</div>

<p>একগুচ্ছ কাঠগোলাপ হাতে অপেক্ষা করবো। ☕💑</p>

</div>

</div>


<script>

/* No button runs away */

let noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", function(){

let x = Math.random()*300;
let y = Math.random()*300;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

});


/* Yes button shows second page */

document.getElementById("yes").onclick = function(){

document.getElementById("firstPage").style.display="none";
document.getElementById("secondPage").style.display="block";

}

</script>

</body>
</html>
